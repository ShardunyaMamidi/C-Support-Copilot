services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports: ["8000:8000"]
    env_file: .env

  mcp_server:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    ports: ["9000:9000"]
    env_file: .env
    environment:
      APP_URL: http://app:8000
      MCP_TRANSPORT: sse
      MCP_PORT: "9000"
    depends_on: [app]